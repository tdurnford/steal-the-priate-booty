name: CI

on:
  push:
  pull_request:

jobs:
  lint-format-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rokit
        uses: rojo-rbx/setup-rokit@v1

      - name: Install tools
        run: rokit install

      - name: Format check (StyLua)
        run: stylua --check src

      - name: Lint (Selene)
        run: selene src

      - name: Rojo build
        run: |
          mkdir -p build
          rojo build default.project.json -o build/MyGame.rbxlx
